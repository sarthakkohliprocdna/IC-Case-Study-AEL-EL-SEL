dimensions:
  - name: Problem structuring
    weight: 20
    description: Identifies the real business and IC design problem, frames the launch-to-growth transition, and clarifies tradeoffs.
    positive_signals:
      - label: launch-to-growth transition
        terms:
          - launch-to-growth transition
          - launch acceleration to sustainable growth
          - launch acceleration toward sustainable growth
          - rapid launch adoption to sustained growth
          - initial launch adoption to sustained adoption
          - next phase of commercialization
      - label: fairness and motivation tradeoff
