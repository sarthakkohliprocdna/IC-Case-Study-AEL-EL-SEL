          - opportunity differences
          - structural territory differences
          - territory potential
          - high opportunity territories
          - lower opportunity territories
      - label: structural inequity
        terms:
          - structural inequity
          - structural advantage
          - structurally advantaged
          - goal equity
          - goal fairness
          - territory equity
      - label: problem framing before solutioning
        terms:
          - problem framing
          - diagnose before design
          - not just payout mechanics
          - broader than payout
          - broader than goal setting
      - label: separates symptoms from root causes
        terms:
          - root cause
          - symptoms
          - underlying drivers
          - commercial drivers
          - structural drivers
